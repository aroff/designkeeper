[target.x86_64-unknown-linux-musl]
# perl is required by openssl-sys to compile vendored OpenSSL from source.
pre-build = ["apt-get install -y --no-install-recommends perl"]

[target.x86_64-unknown-linux-musl.env]
# Forward vendored-OpenSSL trigger vars from the runner into the cross container.
passthrough = ["OPENSSL_STATIC", "OPENSSL_VENDORED"]
